<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电子元器件选型系统</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --orange:#f97316;--orange-light:#fb923c;--orange-dark:#ea580c;
  --bg:#fff8f1;--bg-card:#ffffff;--bg-card-alt:#fffbf7;--bg-warm:#fff7ed;
  --text:#1a1a1a;--text-secondary:#6b7280;--text-muted:#9ca3af;
  --border:#f3e8de;--border-orange:rgba(249,115,22,0.3);
  --green:#0f9f6e;--green-light:rgba(15,159,110,0.14);
  --shadow:0 2px 12px rgba(0,0,0,0.06);--shadow-lg:0 8px 30px rgba(0,0,0,0.1);
  --radius:18px;--radius-sm:12px;--radius-pill:999px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
}
html{font-size:14px;scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;
  background-image:
    radial-gradient(circle at 10% -8%,rgba(249,115,22,0.22),rgba(0,0,0,0) 240px),
    radial-gradient(circle at 95% 0px,rgba(15,159,110,0.14),rgba(0,0,0,0) 224px),
    rgb(255,248,241);
  background-attachment:fixed;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .35s ease-out both}
.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}

/* Header */
.header{background:rgba(255,255,255,0.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;padding:0 24px}
.header-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;height:60px;gap:16px}
.logo{font-size:1.3rem;font-weight:700;color:var(--orange);display:flex;align-items:center;gap:8px;white-space:nowrap;flex-shrink:0;cursor:pointer}
.logo svg{width:28px;height:28px}
.global-search{flex:1;max-width:420px;position:relative}
.global-search input{width:100%;height:38px;padding:0 16px 0 38px;border:1px solid var(--border);border-radius:var(--radius-pill);
  background:var(--bg);font-size:.9rem;font-family:var(--font);outline:none;transition:all .2s}
.global-search input:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(249,115,22,0.12)}
.global-search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none}
.global-search .clear-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;
  border:none;background:var(--border);color:var(--text-muted);font-size:12px;cursor:pointer;display:none;align-items:center;justify-content:center}
.global-search .clear-btn.visible{display:flex}
.nav-tabs{display:flex;gap:4px;flex-shrink:0}
.nav-tab{padding:8px 20px;border-radius:var(--radius-pill);cursor:pointer;font-weight:500;
  color:var(--text-secondary);transition:all .2s;border:none;background:transparent;font-size:.95rem;font-family:var(--font)}
.nav-tab:hover{color:var(--orange);background:rgba(249,115,22,0.08)}
.nav-tab.active{background:var(--orange);color:#fff;box-shadow:0 2px 8px rgba(249,115,22,0.3)}

/* Search dropdown */
.search-dropdown{position:absolute;top:calc(100% + 6px);left:0;right:0;background:#fff;border:1px solid var(--border);border-radius:var(--radius-sm);
  box-shadow:var(--shadow-lg);z-index:200;max-height:400px;overflow-y:auto;display:none}
.search-dropdown.visible{display:block}
.search-dropdown-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;transition:background .15s}
.search-dropdown-item:hover{background:var(--bg-warm)}
.search-dropdown-item .sd-model{font-weight:700;color:var(--orange);font-size:.95rem}
.search-dropdown-item .sd-name{color:var(--text-secondary);font-size:.85rem;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search-dropdown-item .sd-brand{font-size:.75rem;color:var(--text-muted);background:var(--bg-warm);padding:2px 8px;border-radius:var(--radius-pill)}
.search-dropdown-header{padding:8px 14px;font-size:.75rem;color:var(--text-muted);background:var(--bg-warm);position:sticky;top:0;z-index:1}

/* Layout */
.container{max-width:1400px;margin:0 auto;padding:24px}
.page{display:none}
.page.active{display:block}

/* Cards */
.card{background:linear-gradient(135deg,rgb(255,247,237),rgb(255,255,255));border:1px solid rgba(255,215,173,0.92);border-radius:18px;transition:all .2s ease}
.card:hover{box-shadow:0 8px 24px rgba(249,115,22,0.1);border-color:rgba(249,115,22,0.3)}
.card-pad{padding:24px}
.card-pad-sm{padding:16px}

/* Buttons */
.btn-primary{background:linear-gradient(135deg,rgb(249,115,22),rgb(251,146,60));color:white;border-radius:999px;padding:10px 24px;font-weight:500;transition:all .2s ease;border:none;cursor:pointer;font-family:var(--font);font-size:.9rem}
.btn-primary:hover{background:linear-gradient(135deg,rgb(234,88,12),rgb(249,115,22));transform:translateY(-1px);box-shadow:0 4px 12px rgba(249,115,22,0.3)}
.btn-soft{background:rgba(255,255,255,0.8);color:var(--text);border-radius:999px;padding:10px 24px;font-weight:500;transition:all .2s ease;border:1px solid var(--border);cursor:pointer;font-family:var(--font);font-size:.9rem}
.btn-soft:hover{background:white;border-color:var(--orange);color:var(--orange)}
.btn-sm{padding:6px 16px;font-size:.85rem}
.btn-xs{padding:4px 12px;font-size:.8rem}
.btn-icon{padding:6px;border-radius:8px;background:transparent;border:none;cursor:pointer;color:var(--text-secondary);transition:all .15s}
.btn-icon:hover{background:rgba(249,115,22,0.1);color:var(--orange)}
.btn-danger{color:#ef4444}.btn-danger:hover{background:#fef2f2;color:#dc2626}

/* Tags */
.tag{background:rgba(249,115,22,0.1);color:var(--orange-dark);border-radius:999px;padding:4px 12px;font-size:12px;font-weight:500;display:inline-block}
.tag-green{background:var(--green-light);color:var(--green)}

/* Forms */
.input{width:100%;padding:10px 16px;border:2px solid var(--border);border-radius:999px;font-size:14px;transition:all .2s ease;font-family:var(--font);outline:none;background:#fff}
.input:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(249,115,22,0.15)}
.select{width:100%;padding:10px 16px;border:2px solid var(--border);border-radius:999px;font-size:14px;font-family:var(--font);outline:none;background:#fff;appearance:none}
.select:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(249,115,22,0.15)}

/* Tables */
.table{width:100%;border-collapse:collapse}
.table th,.table td{padding:10px 14px;text-align:left;font-size:.9rem}
.table th{font-weight:600;color:var(--text-secondary);font-size:.8rem;text-transform:uppercase;letter-spacing:.02em;background:var(--bg-warm)}
.table tbody tr{border-bottom:1px solid var(--border);transition:background .15s}
.table tbody tr:hover{background:rgba(249,115,22,0.03)}

/* Grid */
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
@media(max-width:1024px){.grid-3{grid-template-columns:repeat(2,1fr)}.grid-4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.grid-3,.grid-2,.grid-4{grid-template-columns:1fr}}

/* Flex */
.flex{display:flex}.flex-1{flex:1}.items-center{align-items:center}.justify-between{justify-content:space-between}
.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}.gap-6{gap:24px}

/* Sidebar layout */
.layout-sidebar{display:flex;gap:24px}
.sidebar{width:260px;flex-shrink:0}
.main-content{flex:1;min-width:0}
@media(max-width:900px){.layout-sidebar{flex-direction:column}.sidebar{width:100%}}

/* Scrollbar */
.scrollbar::-webkit-scrollbar{width:6px}
.scrollbar::-webkit-scrollbar-track{background:#f1f1f1;border-radius:3px}
.scrollbar::-webkit-scrollbar-thumb{background:#d6d3d1;border-radius:3px}
.scrollbar::-webkit-scrollbar-thumb:hover{background:#a8a29e}

/* Text utilities */
.text-primary{color:var(--orange)}.text-secondary{color:var(--text-secondary)}.text-muted{color:var(--text-muted)}
.text-green{color:var(--green)}.text-danger{color:#ef4444}
.font-bold{font-weight:700}.font-semibold{font-weight:600}.font-medium{font-weight:500}
.text-lg{font-size:1.125rem}.text-xl{font-size:1.25rem}.text-2xl{font-size:1.5rem}
.text-sm{font-size:.875rem}.text-xs{font-size:.75rem}
.truncate{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.text-center{text-align:center}

/* Spacing */
.mb-1{margin-bottom:4px}.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}
.mt-1{margin-top:4px}.mt-2{margin-top:8px}.mt-3{margin-top:12px}
.p-4{padding:16px}.p-6{padding:24px}
.py-2{padding-top:8px;padding-bottom:8px}.py-3{padding-top:12px;padding-bottom:12px}
.px-3{padding-left:12px;padding-right:12px}.px-4{padding-left:16px;padding-right:16px}
.space-y-2>*+*{margin-top:8px}.space-y-3>*+*{margin-top:12px}.space-y-4>*+*{margin-top:16px}.space-y-6>*+*{margin-top:24px}

/* Admin tabs */
.admin-tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:24px}
.admin-tab{padding:12px 24px;font-size:.9rem;font-weight:500;color:var(--text-secondary);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s;background:transparent;border:none;font-family:var(--font)}
.admin-tab:hover{color:var(--orange)}
.admin-tab.active{color:var(--orange);border-bottom-color:var(--orange)}
.admin-section{display:none}.admin-section.active{display:block}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:500;padding:24px}
.modal-overlay.visible{display:flex}
.modal{background:#fff;border-radius:18px;box-shadow:var(--shadow-lg);width:100%;max-width:560px;max-height:90vh;overflow-y:auto}
.modal-lg{max-width:720px}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:12px}

/* Filter pills */
.filter-pill{padding:5px 12px;border-radius:999px;border:1px solid var(--border);font-size:.8rem;cursor:pointer;transition:all .15s;background:transparent;color:var(--text-secondary)}
.filter-pill:hover{border-color:var(--orange);color:var(--orange)}
.filter-pill.active{background:var(--orange);color:#fff;border-color:var(--orange)}

/* Empty state */
.empty-state{text-align:center;padding:64px 24px}
.empty-state svg{width:64px;height:64px;color:var(--border);margin-bottom:16px}

/* Product row */
.product-row{display:flex;align-items:center;gap:16px;padding:16px;border-radius:var(--radius);cursor:pointer;transition:all .15s;border:1px solid transparent}
.product-row:hover{border-color:rgba(249,115,22,0.2);background:rgba(249,115,22,0.02)}
.product-img{width:64px;height:64px;background:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid var(--border)}
.product-img img{max-width:48px;max-height:48px;object-fit:contain}

/* Brand card in admin */
.brand-card-admin{background:linear-gradient(135deg,rgb(255,247,237),rgb(255,255,255));border:1px solid rgba(255,215,173,0.92);border-radius:18px;padding:20px;transition:all .2s}
.brand-card-admin:hover{box-shadow:0 8px 24px rgba(249,115,22,0.1)}

/* Naming rule table */
.rule-table{width:100%;border-collapse:collapse;font-size:.85rem}
.rule-table th{background:var(--bg-warm);padding:10px 12px;text-align:left;font-weight:600;color:var(--text-secondary);font-size:.8rem;border-bottom:1px solid var(--border)}
.rule-table td{padding:10px 12px;border-bottom:1px solid var(--border)}
.rule-table tr:hover{background:rgba(249,115,22,0.02)}

/* Expandable */
.expand-content{max-height:0;overflow:hidden;transition:max-height .3s ease}
.expand-content.open{max-height:2000px}
.expand-btn{cursor:pointer;user-select:none;display:flex;align-items:center;gap:6px}
.expand-btn::after{content:'▼';font-size:.7rem;transition:transform .2s;color:var(--text-muted)}
.expand-btn.open::after{transform:rotate(180deg)}

/* Category tree */
.cat-parent{font-weight:600;color:var(--orange);padding:6px 8px;border-radius:8px;background:rgba(249,115,22,0.06);margin-bottom:4px}
.cat-child{display:block;width:100%;text-align:left;padding:6px 12px;border-radius:8px;font-size:.85rem;cursor:pointer;transition:all .15s;border:none;background:transparent;color:var(--text-secondary);margin-top:2px}
.cat-child:hover{background:rgba(249,115,22,0.06);color:var(--orange)}
.cat-child.active{background:var(--orange);color:#fff}

/* Responsive */
@media(max-width:640px){
  .header-inner{flex-wrap:wrap;height:auto;padding:8px 0}
  .global-search{order:3;width:100%;max-width:none;margin-top:4px}
  .nav-tabs{width:100%;justify-content:center}
  .container{padding:16px}
}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-inner">
    <div class="logo" onclick="goHome()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M9 9h6v6H9z"/></svg>
      ZR 电子元器件选型
    </div>
    <div class="global-search">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="globalSearchInput" placeholder="搜索型号、参数反查，如 0805 10uF" autocomplete="off" oninput="onGlobalSearchInput(this.value)" onkeydown="if(event.key==='Enter')goSearch(this.value)">
      <button class="clear-btn" id="searchClearBtn" onclick="clearGlobalSearch()">×</button>
      <div class="search-dropdown" id="searchDropdown"></div>
    </div>
    <nav class="nav-tabs">
      <button class="nav-tab" id="nav-resistor" onclick="goCatalog('resistor')">电阻</button>
      <button class="nav-tab" id="nav-capacitor" onclick="goCatalog('capacitor')">电容</button>
      <button class="nav-tab" id="nav-search" onclick="goSearch('')">搜索</button>
      <button class="nav-tab" id="nav-admin" onclick="goAdmin()">管理</button>
    </nav>
  </div>
</header>

<!-- Catalog Page -->
<div class="page active" id="page-catalog">
  <div class="container">
    <div class="layout-sidebar">
      <aside class="sidebar space-y-4">
        <div class="card card-pad-sm">
          <h3 class="font-semibold text-sm mb-3">目录</h3>
          <div class="scrollbar" style="max-height:300px;overflow-y:auto" id="categoryList"></div>
        </div>
        <div class="card card-pad-sm">
          <h3 class="font-semibold text-sm mb-3">品牌</h3>
          <div class="scrollbar" style="max-height:240px;overflow-y:auto" id="brandFilterList"></div>
        </div>
        <div id="filterPanel"></div>
      </aside>
      <div class="main-content space-y-4">
        <div class="card card-pad flex items-center justify-between">
          <h2 class="font-bold text-lg" id="catalogTitle">电阻型号大全</h2>
          <span class="text-sm text-secondary">共找到 <span class="font-semibold text-primary" id="catalogCount">0</span> 个型号</span>
        </div>
        <div id="productList"></div>
      </div>
    </div>
  </div>
</div>

<!-- Search Page -->
<div class="page" id="page-search">
  <div class="container space-y-6">
    <button class="btn-soft btn-sm" onclick="goBack()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;vertical-align:middle;margin-right:4px"><path d="M15 19l-7-7 7-7"/></svg>
      返回列表
    </button>
    <div id="searchResults"></div>
  </div>
</div>

<!-- Product Detail Page -->
<div class="page" id="page-product">
  <div class="container">
    <button class="btn-soft btn-sm mb-4" onclick="goBack()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;vertical-align:middle;margin-right:4px"><path d="M15 19l-7-7 7-7"/></svg>
      返回列表
    </button>
    <div id="productDetailContent"></div>
  </div>
</div>

<!-- Brand Detail Page -->
<div class="page" id="page-brand">
  <div class="container space-y-6">
    <button class="btn-soft btn-sm" onclick="goBack()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;vertical-align:middle;margin-right:4px"><path d="M15 19l-7-7 7-7"/></svg>
      返回列表
    </button>
    <div id="brandDetailContent"></div>
  </div>
</div>

<!-- Admin Page -->
<div class="page" id="page-admin">
  <div class="container space-y-6">
    <div class="card card-pad">
      <h1 class="text-2xl font-bold mb-2">后台管理</h1>
      <p class="text-secondary">管理品牌、产品和命名规则数据</p>
    </div>
    <div class="admin-tabs">
      <button class="admin-tab active" onclick="switchAdminTab('brands')">品牌管理 <span class="tag" style="margin-left:4px" id="adminBrandCount">0</span></button>
      <button class="admin-tab" onclick="switchAdminTab('products')">产品管理 <span class="tag" style="margin-left:4px" id="adminProductCount">0</span></button>
      <button class="admin-tab" onclick="switchAdminTab('rules')">命名规则 <span class="tag" style="margin-left:4px" id="adminRuleCount">0</span></button>
      <button class="admin-tab" onclick="switchAdminTab('validator')">料号验证</button>
    </div>
    <div class="admin-section active" id="admin-brands"></div>
    <div class="admin-section" id="admin-products"></div>
    <div class="admin-section" id="admin-rules"></div>
    <div class="admin-section" id="admin-validator"></div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalContent"></div>
</div>

<script>
// ==================== DATA ====================
const STORAGE_KEYS={brands:'zr_brands',products:'zr_products'};
function loadStorage(key,def){try{const r=localStorage.getItem(key);if(r){const parsed=JSON.parse(r);if(Array.isArray(parsed)&&parsed.length===0&&Array.isArray(def)&&def.length>0)return def;return parsed;}}catch(e){}return def}
function saveStorage(key,val){try{localStorage.setItem(key,JSON.stringify(val))}catch(e){}}

const DEFAULT_BRANDS=[
{id:'fojan',name:'FOJAN(富捷)',origin:'中国大陆',categories:['resistor','capacitor'],namingRules:[{id:'fojan-resistor',categoryId:'smd-resistor',pattern:'FRC{封装}{精度}{阻值}{包装}',description:'富捷贴片电阻命名规则',fields:[{name:'系列',position:'FRC',description:'厚膜电阻系列'},{name:'封装',position:'0603/0402/0805/1206',description:'封装尺寸',examples:['0603','0402']},{name:'精度',position:'J/F',description:'J=±5%, F=±1%',examples:['J','F']},{name:'阻值',position:'103/1001/1002',description:'阻值代码',examples:['103=10kΩ','1001=1kΩ']},{name:'包装',position:'TS',description:'编带包装',examples:['TS']}]}]},
{id:'uni-royal',name:'UNI-ROYAL(厚声)',origin:'中国台湾',categories:['resistor'],namingRules:[{id:'uni-royal-resistor',categoryId:'smd-resistor',pattern:'{封装}{功率}{精度}{阻值}{温度系数}{包装}',description:'厚声贴片电阻命名规则',fields:[{name:'封装',position:'1206/0805/0603',description:'封装尺寸',examples:['1206','0805']},{name:'功率',position:'W4/W8',description:'功率等级',examples:['W4=1/4W','W8=1/8W']},{name:'精度',position:'F/J',description:'F=±1%, J=±5%',examples:['F','J']},{name:'阻值',position:'1004/0000',description:'阻值代码',examples:['1004=1MΩ','0000=0Ω']},{name:'温度系数',position:'T5',description:'温度系数',examples:['T5']},{name:'包装',position:'E',description:'编带',examples:['E']}]}]},
{id:'samsung',name:'SAMSUNG(三星)',origin:'韩国',categories:['capacitor','resistor'],namingRules:[]},

// ==================== EIA CAPACITOR QUERY PARSER ====================
function parseEIAQuery(q){
  var tokens=q.replace(/,/g,' ').split(/\s+/).filter(function(t){return t;});
  var parsed={size:'',cap:'',capUnit:'',tolerance:'',toleranceMin:'',voltage:'',diel:'',rawTerms:[]};
  var eiaSizes=['0201','0402','0603','0805','1206','1210','1808','1812','2012','2220','2225','01005','0201','0302','0504','0508'];
  var tolCodes={'A':'\u00b10.05pF','B':'\u00b10.1pF','C':'\u00b10.25pF','D':'\u00b10.5pF','E':'\u00b10.25pF','F':'\u00b11%','G':'\u00b12%','H':'\u00b13%','I':'-10%~0%','J':'\u00b15%','K':'\u00b110%','L':'0%~+10%','M':'\u00b120%','N':'-5%~+10%','P':'\u00b10.02pF','Q':'\u00b10.03pF','R':'\u00b11%','S':'\u00b13%','T':'\u00b15%','U':'\u00b17.5%','W':'\u00b110%','Z':'-20%~+80%'};
  var tolPercent={'A':0.05,'B':0.1,'C':0.25,'D':0.5,'F':1,'G':2,'H':3,'J':5,'K':10,'L':10,'M':20,'N':10,'P':0.02,'Q':0.03,'R':1,'S':3,'T':5,'U':7.5,'W':10,'Z':80};
  var dielCodes={'NPO':'NP0','C0G':'C0G','COG':'C0G','X5R':'X5R','X6S':'X6S','X7R':'X7R','X7S':'X7S','Y5V':'Y5V','Z5U':'Z5U'};
  var eiaVoltCodes={'0':'4V','1':'6.3V','2':'10V','3':'16V','4':'25V','5':'50V','6':'100V','7':'200V','8':'250V','9':'500V','A':'1kV','B':'2kV','C':'3kV','D':'4kV','E':'5kV','F':'6kV','G':'10kV'};
  for(var i=0;i<tokens.length;i++){
    var t=tokens[i].toUpperCase();
    var matched=false;
    // Tolerance range: "10%", "±10%", "10%以上", "10%以上含10%", "±10%以上含±10%"
    if(!matched){var tr=t.match(/^([\u00b1]?)(\d+\.?\d*)(%|PF|PF以上|以上)$/);if(tr){
      parsed.toleranceMin=parseFloat(tr[2]);
      matched=true;
    }}
    // EIA compact code: 3-digit cap + tolerance letter + voltage code (e.g. "104KB", "106MQ", "472KT")
    if(!matched){var compact=t.match(/^(\d{3})([A-Z])([0-9A-G])$/);if(compact){
      var sig=parseInt(compact[1].substring(0,2)),exp=parseInt(compact[1][2]),pf=sig*Math.pow(10,exp);
      if(pf>=1e6){parsed.cap=(pf/1e6).toString();parsed.capUnit='uF';}else if(pf>=1e3){parsed.cap=(pf/1e3).toString();parsed.capUnit='nF';}else{parsed.cap=pf.toString();parsed.capUnit='pF';}
      parsed.tolerance=tolCodes[compact[2]]||compact[2];
      parsed.voltage=eiaVoltCodes[compact[3]]||compact[3];
      matched=true;
    }}
    // EIA compact without voltage: 3-digit cap + tolerance letter (e.g. "104K", "472M")
    if(!matched){var compact2=t.match(/^(\d{3})([A-Z])$/);if(compact2){
      var sig2=parseInt(compact2[1].substring(0,2)),exp2=parseInt(compact2[1][2]),pf2=sig2*Math.pow(10,exp2);
      if(pf2>=1e6){parsed.cap=(pf2/1e6).toString();parsed.capUnit='uF';}else if(pf2>=1e3){parsed.cap=(pf2/1e3).toString();parsed.capUnit='nF';}else{parsed.cap=pf2.toString();parsed.capUnit='pF';}
      parsed.tolerance=tolCodes[compact2[2]]||compact2[2];
      matched=true;
    }}
    // Size match
    if(!matched&&eiaSizes.indexOf(t)>=0){parsed.size=t;matched=true;}
    // Voltage match (e.g. "50V", "6.3V", "1KV")
    if(!matched){var vm=t.match(/^(\d+\.?\d*)(KV|V)$/);if(vm){parsed.voltage=vm[1]+(vm[2]==='KV'?'kV':'V');matched=true;}}
    // Tolerance match (single letter like K, M, J, F)
    if(!matched&&t.length===1&&tolCodes[t]){parsed.tolerance=tolCodes[t];matched=true;}
    // Dielectric match
    if(!matched&&dielCodes[t]){parsed.diel=dielCodes[t];matched=true;}
    // Capacitance with unit (e.g. "0.1uF", "10nF", "100pF", "1uF", "22pF")
    if(!matched){var cm=t.match(/^(\d+\.?\d*)(UF|NF|PF|UFF|NFF|PFF)$/i);if(cm){parsed.cap=cm[1];parsed.capUnit=cm[2].substring(0,2).toUpperCase();matched=true;}}
    // Capacitance EIA 3-digit code (e.g. "103", "104", "472", "106")
    if(!matched&&/^\d{3}$/.test(t)){var sig=parseInt(t.substring(0,2)),exp=parseInt(t[2]),pf=sig*Math.pow(10,exp);if(pf>=1e6){parsed.cap=(pf/1e6).toString();parsed.capUnit='uF';}else if(pf>=1e3){parsed.cap=(pf/1e3).toString();parsed.capUnit='nF';}else{parsed.cap=pf.toString();parsed.capUnit='pF';}matched=true;}
    // Capacitance R-code (e.g. "4R7", "0R5", "1R0")
    if(!matched&&/^\dR\d$/.test(t)){parsed.cap=t.replace('R','.');parsed.capUnit='pF';matched=true;}
    // Capacitance decimal pF (e.g. "0.1pf", "2.2pf")
    if(!matched){var dm=t.match(/^(\d+\.?\d*)PF$/i);if(dm){parsed.cap=dm[1];parsed.capUnit='pF';matched=true;}}
    if(!matched){parsed.rawTerms.push(tokens[i]);}
  }
  return parsed;
}
function capToPF(cap,unit){
  var n=parseFloat(cap);
  if(unit==='uF')return n*1e6;
  if(unit==='nF')return n*1e3;
  if(unit==='pF')return n;
  return n;
}
function pfToDisplay(pf){
  if(pf>=1e6)return(pf/1e6)+'uF';
  if(pf>=1e3)return(pf/1e3)+'nF';
  return pf+'pF';
}
function normalizeVoltage(v){
  return v.replace(/KV$/i,'kV').replace(/V$/,'V');
}

// ==================== SMART SEARCH ====================
function smartSearch(query){
  var q=query.trim().toLowerCase();
  if(!q)return[];
  var terms=q.split(/\s+/).filter(function(t){return t;});
  if(terms.length===0)return[];

  // Try EIA query parsing for capacitor-like queries
  var eia=parseEIAQuery(q);
  var hasEIAFields=eia.size||eia.cap||eia.voltage||eia.tolerance||eia.diel;

  // Build scoring
  var scored=_products.map(function(p){
    var score=0;
    var brand=getBrand(p.brandId);
    var modelLow=p.model.toLowerCase();
    var nameLow=p.name.toLowerCase();
    var codeLow=p.code.toLowerCase();
    var paramsText=p.parameters.map(function(x){return x.name+' '+x.value;}).join(' ').toLowerCase();

    // Full model match = highest
    if(modelLow===q||codeLow===q){score+=1000;}
    else if(modelLow.includes(q)||codeLow.includes(q)){score+=500;}

    // EIA field matching (high precision)
    if(hasEIAFields){
      var eiaMatches=0;
      // Size match
      if(eia.size){
        if(p.encapsulation===eia.size){score+=150;eiaMatches++;}
        else if(p.encapsulation&&p.encapsulation.includes(eia.size)){score+=100;eiaMatches++;}
      }
      // Capacitance match
      if(eia.cap&&eia.capUnit){
        var targetPF=capToPF(eia.cap,eia.capUnit);
        var capParam=p.parameters.find(function(x){return x.name==='\u5bb9\u503c'||x.name==='Capacitance'||x.name==='capacitance';});
        if(capParam){
          var capVal=capParam.value;
          var capPF=0;
          var cm=capVal.match(/([\d.]+)\s*(uf|nf|pf)/i);
          if(cm){capPF=capToPF(cm[1],cm[2].toUpperCase());}
          if(capPF>0){
            var ratio=targetPF/capPF;
            if(ratio>0.95&&ratio<1.05){score+=200;eiaMatches++;}
            else if(ratio>0.9&&ratio<1.1){score+=150;eiaMatches++;}
            else if(ratio>0.5&&ratio<2){score+=50;eiaMatches++;}
          }
        }
      }
      // Voltage match
      if(eia.voltage){
        var vParam=p.parameters.find(function(x){return x.name==='\u7535\u538b'||x.name==='Voltage'||x.name==='voltage';});
        if(vParam){
          var vVal=vParam.value;
          var nv=normalizeVoltage(eia.voltage);
          if(vVal===nv){score+=150;eiaMatches++;}
          else if(vVal.includes(nv.replace('V',''))){score+=100;eiaMatches++;}
        }
      }
      // Tolerance match
      if(eia.tolerance){
        var tParam=p.parameters.find(function(x){return x.name==='\u7cbe\u5ea6'||x.name==='Tolerance'||x.name==='tolerance';});
        if(tParam&&tParam.value===eia.tolerance){score+=120;eiaMatches++;}
      }
      // Dielectric match
      if(eia.diel){
        var dParam=p.parameters.find(function(x){return x.name==='\u6e29\u5ea6\u7279\u6027'||x.name==='\u4ecb\u7535\u8d28'||x.name==='Temperature'||x.name==='Dielectric';});
        if(dParam&&dParam.value.toUpperCase()===eia.diel.toUpperCase()){score+=120;eiaMatches++;}
      }
      // Bonus for matching all EIA fields
      var eiaFieldCount=(eia.size?1:0)+(eia.cap?1:0)+(eia.voltage?1:0)+(eia.tolerance?1:0)+(eia.diel?1:0);
      if(eiaFieldCount>0&&eiaMatches>=eiaFieldCount){score+=300;}
      else if(eiaMatches>=2){score+=150;}
    }

    // Multi-term matching (fallback)
    var termMatches=0;
    terms.forEach(function(term){
      if(p.encapsulation.toLowerCase().includes(term)){score+=80;termMatches++;}
      var paramMatch=p.parameters.some(function(param){
        var pv=param.value.toLowerCase();
        var pn=param.name.toLowerCase();
        return pv.includes(term)||pn.includes(term);
      });
      if(paramMatch){score+=60;termMatches++;}
      if(modelLow.includes(term)){score+=40;termMatches++;}
      if(nameLow.includes(term)){score+=20;termMatches++;}
      if(brand&&(brand.name.toLowerCase().includes(term)||brand.id.toLowerCase().includes(term))){score+=30;termMatches++;}
    });

    if(termMatches>=terms.length&&terms.length>1){score+=200;}
    else if(termMatches>=2){score+=100;}

    return{product:p,score:score,brand:brand};
  });

  scored.sort(function(a,b){return b.score-a.score;});
  return scored.filter(function(s){return s.score>0;}).slice(0,20);
}

function doModelSearch(){
  var q=_searchQuery.trim().toLowerCase();
  if(!q){renderSearchResults([],'');return;}
  // Reset page on new query
  if(_searchQuery!==q){_searchPage=1;}
  // First try exact model/code match
  var results=_products.filter(function(p){return p.model.toLowerCase().includes(q)||p.code.toLowerCase().includes(q)||p.name.toLowerCase().includes(q);});
  var isEIA=false;
  // If no exact match, try EIA parameter matching
  if(results.length===0){
    var eia=parseEIAQuery(q);
    var hasEIA=eia.size||eia.cap||eia.voltage||eia.tolerance||eia.diel;
    if(hasEIA){
      isEIA=true;
      results=_products.filter(function(p){
        var matchCount=0;
        var totalFields=0;
        if(eia.size){totalFields++;if(p.encapsulation===eia.size){matchCount++;}else if(p.encapsulation&&p.encapsulation.includes(eia.size)){matchCount++;}}
        if(eia.cap&&eia.capUnit){
          totalFields++;
          var targetPF=capToPF(eia.cap,eia.capUnit);
          var capParam=p.parameters.find(function(x){return x.name==='\u5bb9\u503c'||x.name==='Capacitance'||x.name==='capacitance';});
          if(capParam){
            var cm=capParam.value.match(/([\d.]+)\s*(uf|nf|pf)/i);
            if(cm){var capPF=capToPF(cm[1],cm[2].toUpperCase());var ratio=targetPF/capPF;if(ratio>0.9&&ratio<1.1){matchCount++;}}
          }
        }
        if(eia.voltage){
          totalFields++;
          var vParam=p.parameters.find(function(x){return x.name==='\u7535\u538b'||x.name==='Voltage'||x.name==='voltage';});
          if(vParam){var nv=normalizeVoltage(eia.voltage);if(vParam.value===nv||vParam.value.includes(nv.replace('V',''))){matchCount++;}}
        }
        if(eia.tolerance){
          totalFields++;
          var tParam=p.parameters.find(function(x){return x.name==='\u7cbe\u5ea6'||x.name==='Tolerance'||x.name==='tolerance';});
          if(tParam&&tParam.value===eia.tolerance){matchCount++;}
        }
        if(eia.diel){
          totalFields++;
          var dParam=p.parameters.find(function(x){return x.name==='\u6e29\u5ea6\u7279\u6027'||x.name==='\u4ecb\u7535\u8d28'||x.name==='Dielectric';});
          if(dParam&&dParam.value.toUpperCase()===eia.diel.toUpperCase()){matchCount++;}
        }
        return matchCount>0&&matchCount>=Math.ceil(totalFields/2);
      });
      // Sort by match quality
      results.sort(function(a,b){
        var aScore=0,bScore=0;
        if(eia.size&&a.encapsulation===eia.size)aScore+=10;
        if(eia.size&&b.encapsulation===eia.size)bScore+=10;
        if(eia.cap&&eia.capUnit){
          var tPF=capToPF(eia.cap,eia.capUnit);
          var aCP=a.parameters.find(function(x){return x.name==='\u5bb9\u503c'||x.name==='Capacitance';});
          var bCP=b.parameters.find(function(x){return x.name==='\u5bb9\u503c'||x.name==='Capacitance';});
          if(aCP){var am=aCP.value.match(/([\d.]+)\s*(uf|nf|pf)/i);if(am){var r=Math.abs(capToPF(am[1],am[2].toUpperCase())/tPF-1);aScore+=Math.max(0,10-r*20);}}
          if(bCP){var bm=bCP.value.match(/([\d.]+)\s*(uf|nf|pf)/i);if(bm){var r2=Math.abs(capToPF(bm[1],bm[2].toUpperCase())/tPF-1);bScore+=Math.max(0,10-r2*20);}}
        }
        return bScore-aScore;
      });
    }
  }
  // Fallback: try generic fuzzy matching
  if(results.length===0&&!isEIA){
    var terms=q.split(/\s+/).filter(function(t){return t;});
    results=_products.filter(function(p){
      var allText=(p.model+' '+p.name+' '+p.encapsulation+' '+p.parameters.map(function(x){return x.name+' '+x.value;}).join(' ')).toLowerCase();
      return terms.every(function(term){return allText.includes(term);});
    });
  }
  renderSearchResults(results,q);
}

function renderSearchResults(results,query){
  const el=document.getElementById('searchResults');
  if(!results.length){
    if(query)el.innerHTML=emptyState('未找到匹配的产品');
    else el.innerHTML='';
    return;
  }
  const total=results.length;
  const totalPages=Math.ceil(total/SEARCH_PER_PAGE);
  const page=Math.min(_searchPage,totalPages);
  const start=(page-1)*SEARCH_PER_PAGE;
  const pageResults=results.slice(start,start+SEARCH_PER_PAGE);
  const pagination=totalPages>1?`<div class="flex items-center justify-center gap-2 mt-4">`+
    `<button class="btn-soft btn-sm" onclick="goSearchPage(${page-1})" ${page<=1?'disabled':''}>上一页</button>`+
    `<span class="text-sm text-secondary">第 ${page}/${totalPages} 页 (共${total}条)</span>`+
    `<button class="btn-soft btn-sm" onclick="goSearchPage(${page+1})" ${page>=totalPages?'disabled':''}>下一页</button>`+
    `</div>`:'';
  el.innerHTML=`<div class="card card-pad flex items-center justify-between">
    <h2 class="font-bold text-lg">搜索结果</h2>
    <span class="text-sm text-secondary">共找到 <span class="font-semibold text-primary">${total}</span> 个型号</span>
  </div>
  <div class="space-y-3">${pageResults.map((p,i)=>{
    const b=getBrand(p.brandId);

      <div style="flex:1;min-width:0">
        <div class="flex items-center gap-2 mb-1">
          <span class="font-bold text-primary">${p.model}</span>
          <span class="text-xs text-secondary">${p.code}</span>
        </div>
        <div class="text-sm text-secondary truncate">${p.name}</div>
        <div class="flex flex-wrap gap-2 mt-2">${p.parameters.map(param=>`<span class="tag">${param.name}: ${param.value}</span>`).join('')}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div class="text-lg font-bold text-primary">¥${p.price.toFixed(4)}</div>
        <div class="text-xs font-medium ${p.stock>1000?'text-green':'text-primary'}">库存 ${p.stock>10000?(p.stock/10000).toFixed(1)+'万':p.stock}</div>
      </div>
    </div>`;
  }).join('')}</div>${pagination}`;
}

// ==================== PAGINATION ====================
function makePaginationHtml(currentPage,totalPages,total,label){
  if(totalPages<=1)return '';
  const pages=[];
  const maxVisible=5;
  pages.push('<button class="btn-soft btn-xs" '+(currentPage===1?'disabled style="opacity:.4"':'onclick="goToPage(\''+label+'\','+(currentPage-1)+')"')+' >上一页</button>');
  let sp=Math.max(1,currentPage-Math.floor(maxVisible/2));
  let ep=Math.min(totalPages,sp+maxVisible-1);
  if(ep-sp<maxVisible-1)sp=Math.max(1,ep-maxVisible+1);
  if(sp>1)pages.push('<button class="btn-soft btn-xs" onclick="goToPage(\''+label+'\',1)">1</button>');
  if(sp>2)pages.push('<span class="text-xs text-secondary px-1">...</span>');
  for(let p=sp;p<=ep;p++){pages.push(p===currentPage?'<button class="btn-primary btn-xs">'+p+'</button>':'<button class="btn-soft btn-xs" onclick="goToPage(\''+label+'\','+p+')">'+p+'</button>');}
  if(ep<totalPages-1)pages.push('<span class="text-xs text-secondary px-1">...</span>');
  if(ep<totalPages)pages.push('<button class="btn-soft btn-xs" onclick="goToPage(\''+label+'\','+totalPages+')">'+totalPages+'</button>');
  pages.push('<button class="btn-soft btn-xs" '+(currentPage===totalPages?'disabled style="opacity:.4"':'onclick="goToPage(\''+label+'\','+(currentPage+1)+')"')+' >下一页</button>');
  return '<div class="flex items-center justify-center gap-2 mt-6 flex-wrap">'+pages.join('')+'<span class="text-xs text-secondary ml-2">第'+currentPage+'/'+totalPages+'页 (共'+total+')</span></div>';
}
function goToPage(label,p){
  if(label==='brand'){_brandPage=p;renderAdminBrands();document.getElementById('admin-brands').scrollIntoView({behavior:'smooth'});}
  else if(label==='prod'){_prodPage=p;renderAdminProducts();document.getElementById('admin-products').scrollIntoView({behavior:'smooth'});}
  else if(label==='rule'){_rulePage=p;renderAdminRules();document.getElementById('admin-rules').scrollIntoView({behavior:'smooth'});}
}

function renderAdminValidator(){
  document.getElementById('admin-validator').innerHTML=`
    <div class="card card-pad mb-4">
      <h2 class="font-semibold text-lg mb-3">料号验证器</h2>
      <p class="text-sm text-secondary mb-4">输入元器件料号，自动识别品牌、解析命名规则中的各项参数（封装、容值/阻值、精度、电压、温度特性、包装等）</p>
      <div class="flex gap-3 items-center flex-wrap">
        <input type="text" id="partNumberInput" class="form-input" style="flex:1;min-width:250px" placeholder="输入料号，如 CL10A106MA8NRNC、GRM155R71H104KE14D" onkeydown="if(event.key==='Enter')doValidatePartNumber()">
        <button class="btn-primary" onclick="doValidatePartNumber()">验证解析</button>
        <button class="btn-soft" onclick="document.getElementById('partNumberInput').value='';document.getElementById('validatorResult').innerHTML=''">清空</button>
      </div>
    </div>
    <div id="validatorResult"></div>
  `;
}
function doValidatePartNumber(){
  const model=document.getElementById('partNumberInput').value.trim();
  if(!model){document.getElementById('validatorResult').innerHTML='';return;}
  const results=[];
  for(const[pKey,pnr]of Object.entries(PART_NUMBER_RULES)){
    pnr.rules.forEach(r=>{
      if(!r.regex)return;
      try{const re=new RegExp(r.regex);const m=model.match(re);if(m){
        let parsed=null;
        if(r.parser){try{parsed=r.parser(model);}catch(e){parsed=null;}}
        let matchedBrandId=pnr.brandIds&&pnr.brandIds.length?pnr.brandIds[0]:null;
        let matchedBrand=matchedBrandId?_brands.find(b=>b.id===matchedBrandId):null;
        if(!matchedBrand&&pnr.brandIds){for(const bid of pnr.brandIds){const b=_brands.find(x=>x.id===bid);if(b){matchedBrand=b;matchedBrandId=bid;break;}}}
        if(!matchedBrand&&results.length>0)return;
        let grade='普通级';
        if(r.seriesCode){const sc=r.seriesCode.toUpperCase();if(sc.startsWith('GCM')||sc.startsWith('AC'))grade='车规级 (AEC-Q200)';}
        let catLabel='电阻';
        if(matchedBrand&&matchedBrand.categories){catLabel=matchedBrand.categories.includes('capacitor')?'电容':matchedBrand.categories.includes('resistor')?'电阻':'其他';}
        else if(pnr.cat==='capacitor')catLabel='电容';
        results.push({brand:matchedBrand?matchedBrand.name:(matchedBrandId?matchedBrandId:''),brandId:matchedBrandId||'',origin:matchedBrand?matchedBrand.origin:'',cat:catLabel,rule:r,parsed,match:m,grade});
      }}catch(e){}
    });
  }
  _brands.forEach(b=>{(b.namingRules||[]).forEach(r=>{
    if(!r.regex)return;
    try{const re=new RegExp(r.regex);const m=model.match(re);if(m){
      let parsed=null;
      if(r.parser){try{const fn=new Function('model','return '+r.parser);parsed=fn(model);}catch(e){parsed=null;}}
      let grade='普通级';
      const catLabel=b.categories.includes('capacitor')?'电容':'电阻';
      if(r.seriesCode){
        const sc=r.seriesCode.toUpperCase();
        if(sc.startsWith('GCM')||sc.startsWith('GCJ')||sc.includes('AUTO')||sc.includes('AEC')){grade='车规级 (AEC-Q200)';}
        else if(sc.startsWith('AC')&&(b.id==='yageo'||b.id==='yageo-tw')){grade='车规级 (AEC-Q200)';}
      }
      results.push({brand:b.name,brandId:b.id,origin:b.origin,cat:catLabel,rule:r,parsed,match:m,grade});
    }}catch(e){}
  });});
  if(results.length===0){
    document.getElementById('validatorResult').innerHTML=`<div class="card card-pad" style="border-left:4px solid #ef4444"><p class="text-danger font-medium">未找到匹配的命名规则</p><p class="text-sm text-secondary mt-1">请检查料号是否正确，或该品牌的命名规则尚未录入</p></div>`;
    return;
  }
  let html=`<div class="text-sm text-secondary mb-3">找到 ${results.length} 个匹配规则</div>`;
  html+=results.map(r=>`
    <div class="card card-pad mb-4" style="border-left:4px solid #22c55e">
      <div class="flex items-center gap-3 mb-3 flex-wrap">
        <span class="font-bold text-lg">${r.brand}</span>
        <span class="text-sm text-secondary">${r.origin}</span>
        <span class="tag">${r.cat}</span>
        <span class="tag" style="background:${r.grade.includes('车规')?'rgba(239,68,68,0.1);color:#ef4444;border-color:#ef4444':'rgba(34,197,94,0.1);color:#22c55e;border-color:#22c55e'}">${r.grade}</span>
        ${r.rule.seriesCode?`<span class="text-sm font-mono" style="background:rgba(249,115,22,0.08);padding:2px 10px;border-radius:6px;color:#f97316">${r.rule.seriesCode}</span>`:''}
        <span class="text-sm">${r.rule.seriesName||r.rule.description||''}</span>
        ${_brands.find(b=>b.id===r.brandId)?.website?`<a href="${_brands.find(b=>b.id===r.brandId).website}" target="_blank" class="text-xs text-primary" style="text-decoration:none">访问官网</a>`:''}
      </div>
      ${r.parsed?`<table class="rule-table"><thead><tr><th>参数</th><th>代码</th><th>含义</th></tr></thead><tbody>${r.parsed.map(f=>`<tr><td class="font-medium">${f.name}</td><td class="text-primary font-mono">${f.code}</td><td>${f.meaning}</td></tr>`).join('')}</tbody></table>`:'<p class="text-sm text-secondary">规则匹配但无法解析详细参数</p>'}
    </div>
  `).join('');
  document.getElementById('validatorResult').innerHTML=html;
}

function autoFillFromPNR(){
  const model=document.getElementById('pf-model').value.trim();
  if(!model)return;
  const results=[];
  for(const[pKey,pnr]of Object.entries(PART_NUMBER_RULES)){
    for(const r of pnr.rules){
      if(!r.regex)continue;
      try{
        const re=new RegExp(r.regex);
        const m=model.match(re);
        if(m){
          let parsed=null;
          if(r.parser){try{parsed=r.parser(model);}catch(e){parsed=null;}}
          if(parsed&&parsed.length>0){
            const matchedBrandId=pnr.brandIds&&pnr.brandIds.length?pnr.brandIds[0]:null;
            const matchedBrand=matchedBrandId?_brands.find(b=>b.id===matchedBrandId):null;
            if(!matchedBrand&&results.length>0)continue;
            results.push({key:pKey,brand:matchedBrand,pnr,series:r.seriesCode,cat:pnr.cat,parsed,match:m});
          }
        }
      }catch(e){}
    }
  }
  if(results.length===0){
    const div=document.getElementById('pnr-result');
    if(div){div.style.display='block';div.innerHTML='<span class="text-sm text-danger">未识别到该料号规则，请手动填写</span>';}
    return;
  }
  const best=results[0];
  const isCap=best.cat==='capacitor';
  const catId=isCap?'mlcc':'smd-resistor';
  const catName=isCap?'电容':'电阻';
  
  // Auto fill brand
  if(best.brand){
    document.getElementById('pf-brand').value=best.brand.id;
  }
  
  // Auto fill encapsulation
  const encField=best.parsed.find(f=>f.name==='封装'||f.name==='封装/功率');
  if(encField)document.getElementById('pf-encap').value=encField.code;
  
  // Auto fill name/description
  let nameParts=[];
  if(isCap){
    const cap=best.parsed.find(f=>f.name==='容值');
    const tol=best.parsed.find(f=>f.name==='精度');
    const volt=best.parsed.find(f=>f.name==='电压');
    const temp=best.parsed.find(f=>f.name==='温度特性');
    if(cap)nameParts.push(cap.meaning||cap.code);
    if(tol)nameParts.push(tol.meaning||tol.code);
    if(volt)nameParts.push(volt.meaning||volt.code);
    if(temp)nameParts.push(temp.meaning||temp.code);
  }else{
    const res=best.parsed.find(f=>f.name==='阻值');
    const tol=best.parsed.find(f=>f.name==='精度');
    const pow=best.parsed.find(f=>f.name==='功率');
    if(res)nameParts.push(res.meaning||res.code);
    if(tol)nameParts.push(tol.meaning||tol.code);
    if(pow)nameParts.push(pow.meaning||pow.code);
  }
  if(nameParts.length>0)document.getElementById('pf-name').value=nameParts.join(' ');
  
  // Show result
  const div=document.getElementById('pnr-result');
  if(div){
    div.style.display='block';
    let html='<div class="flex items-center gap-2 mb-2"><span class="font-bold">已识别：</span><span class="tag" style="background:rgba(34,197,94,0.1);color:#22c55e;border-color:#22c55e">'+catName+'</span>';
    if(best.brand)html+='<span class="tag">'+best.brand.name+'</span>';
    html+='<span class="text-sm font-mono" style="background:rgba(249,115,22,0.08);padding:2px 10px;border-radius:6px;color:#f97316">'+best.series+'</span></div>';
    html+='<table class="rule-table" style="font-size:12px"><thead><tr><th>参数</th><th>代码</th><th>含义</th></tr></thead><tbody>';
    best.parsed.forEach(f=>{
      html+='<tr><td class="font-medium">'+f.name+'</td><td class="text-primary font-mono">'+f.code+'</td><td>'+(f.meaning||'')+'</td></tr>';
    });
    html+='</tbody></table>';
    div.innerHTML=html;
  }
}

function saveProductForm(id){
  const model=document.getElementById('pf-model').value.trim();
  const brandId=document.getElementById('pf-brand').value;
  if(!model||!brandId)return alert('请输入型号和选择品牌');
  // Detect category from PNR if available
  let categoryId='smd-resistor';
  for(const[pKey,pnr]of Object.entries(PART_NUMBER_RULES)){
    for(const r of pnr.rules){
      if(!r.regex)continue;
      try{
        const re=new RegExp(r.regex);

          categoryId=pnr.cat==='capacitor'?'mlcc':'smd-resistor';
          break;
        }
      }catch(e){}
    }
    if(categoryId!=='smd-resistor')break;
  }
  const product={id:id||Date.now().toString(),code:document.getElementById('pf-code').value.trim()||'',model,name:document.getElementById('pf-name').value.trim()||model,categoryId,brandId,encapsulation:document.getElementById('pf-encap').value.trim(),stock:parseInt(document.getElementById('pf-stock').value)||0,price:parseFloat(document.getElementById('pf-price').value)||0,parameters:id?getProduct(id).parameters:[],tags:['通用型'],packageType:'编带',certifications:['RoHS认证']};
  if(id){const idx=_products.findIndex(x=>x.id===id);if(idx>=0)_products[idx]=product;}
  else{_products.push(product);}
  saveData();renderAdmin();closeModal();
}

function onGenCatChange(cat){
  const capFields=document.getElementById('gen-cap-fields');
  if(capFields)capFields.style.display=cat==='capacitor'?'grid':'none';

function generatePartNumbers(){
  const cat=document.getElementById('gen-cat').value;
  const size=document.getElementById('gen-size').value;
  const value=document.getElementById('gen-value').value.trim();
  const tol=document.getElementById('gen-tol').value;
  const volt=document.getElementById('gen-volt')?.value||'';
  const temp=document.getElementById('gen-temp')?.value||'';
  if(!size||!value||!tol){alert('请填写封装、容值/阻值和精度');return;}
  
  const results=[];
  if(cat==='capacitor'){
    // Samsung CL: CL + sizeCode + dielectric + capCode + tol + volt + thickness + electrode + product + special + pack
    const sSizeMap={'0402':'05','0603':'10','0805':'21','1206':'31','1210':'32'};
    const dMap={'X5R':'A','X7R':'B','C0G':'C','Y5V':'F'};
    const vMap={'6.3V':'Q','10V':'P','16V':'O','25V':'A','50V':'B'};
    const tMap={'F':'F','J':'J','K':'K','M':'M'};
    const capCode=encodeCapacitance(value);
    if(capCode&&sSizeMap[size]&&dMap[temp]&&vMap[volt]){
      results.push({brand:'Samsung(三星)',series:'CL',model:'CL'+sSizeMap[size]+dMap[temp]+capCode+tMap[tol]+vMap[volt]+'8NNNC'});
    }
    // Murata GRM: GRM + sizeCode + temp + volt + capCode + tol + pack(3位如D01D)
    const mSizeMap={'0402':'155','0603':'188','0805':'21B','1206':'31C'};
    const mtMap={'X5R':'R61','X7R':'R71','C0G':'C1H'};
    const mvMap={'6.3V':'0J','10V':'1A','16V':'1C','25V':'1E','50V':'1H'};
    if(capCode&&mSizeMap[size]&&mtMap[temp]&&mvMap[volt]){
      results.push({brand:'Murata(村田)',series:'GRM',model:'GRM'+mSizeMap[size]+mtMap[temp]+mvMap[volt]+capCode+tMap[tol]+'D01D'});
    }
    // Yageo CC (Short): CC + size + temp + volt + capCode + tol
    const yTempMap={'X5R':'X5R','X7R':'X7R','C0G':'NPO'};
    const yVoltMap={'6.3V':'0J','10V':'1A','16V':'1C','25V':'1E','50V':'1H'};
    if(capCode&&yTempMap[temp]&&yVoltMap[volt]){
      results.push({brand:'Yageo(国巨)',series:'CC',model:'CC'+size+yTempMap[temp]+yVoltMap[volt]+capCode+tMap[tol]});
    }
  }else{
    // Resistor
    const rMap={'F':'F','J':'J','K':'K'};
    const resCode=encodeResistance(value);
    if(resCode){
      results.push({brand:'Yageo(国巨)',series:'RC',model:'RC'+size+rMap[tol]+'R-07'+resCode+'L'});
      results.push({brand:'Uniroyal(厚声)',series:'0402',model:'0402WGF'+resCode+'TCE'});
    }
  }
  
  const div=document.getElementById('gen-results');
  if(div){
    div.style.display='block';
    if(results.length===0){div.innerHTML='<span class="text-sm text-danger">无法生成料号，请检查参数组合</span>';return;}
    let html='<table class="rule-table"><thead><tr><th>品牌</th><th>系列</th><th>料号</th><th>操作</th></tr></thead><tbody>';
    results.forEach(r=>{
      html+='<tr><td>'+r.brand+'</td><td>'+r.series+'</td><td class="font-mono text-primary">'+r.model+'</td><td><button class="btn-primary btn-sm" onclick="useGeneratedPNR(\''+r.model+'\')">使用</button></td></tr>';
    });
    html+='</tbody></table>';
    div.innerHTML=html;
  }
}

function encodeCapacitance(val){
  val=val.toLowerCase().replace(/\s/g,'');
  var pf=0;
  if(val.includes('uf')||val.includes('μf')){pf=parseFloat(val)*1e6;}
  else if(val.includes('nf')){pf=parseFloat(val)*1e3;}
  else if(val.includes('pf')){pf=parseFloat(val);}
  else if(val.includes('r')){return val.toUpperCase();}
  else{pf=parseFloat(val);}
  if(!pf||pf<=0)return'';
  if(pf<10)return String(Math.round(pf)).replace('.','R');
  var exp=0,n=pf;
  while(n>=100){n/=10;exp++;}
  var sig=Math.round(n);
  if(sig>=100){sig/=10;exp++;}
  return String(sig)+String(exp);
}

function encodeResistance(val){
  val=val.toLowerCase().replace(/\s/g,'');
  var ohms=0;
  if(val.includes('k')){var parts=val.split('k');ohms=parseFloat(parts[0])*(parts[1]?Math.pow(10,parts[1].length):1)*1e3;}
  else if(val.includes('m')){var parts=val.split('m');ohms=parseFloat(parts[0])*(parts[1]?Math.pow(10,parts[1].length):1)*1e6;}
  else if(val.includes('r')){return val.toUpperCase();}
  else{ohms=parseFloat(val);}
  if(!ohms||ohms<=0)return'';
  if(ohms<10)return String(ohms).replace('.','R');
  var sig=Math.round(ohms),exp=0;
  while(sig%10===0&&sig>=100){sig/=10;exp++;}
  if(exp===0)return String(sig);
  return String(sig)+String(exp);
}

function addRuleFieldRow(){
  const container=document.getElementById('rf-fields');
  if(!container)return;
  const div=document.createElement('div');
  div.className='flex gap-2';
  div.innerHTML=`<input type="text" placeholder="字段名" class="input flex-1 text-sm"><input type="text" placeholder="位置/取值" class="input flex-1 text-sm"><input type="text" placeholder="说明" class="input flex-1 text-sm"><button class="btn-icon btn-danger" onclick="this.parentElement.remove()">×</button>`;
  container.appendChild(div);
}

function saveRuleForm(brandId){
  const desc=document.getElementById('rf-desc').value.trim();
  const pattern=document.getElementById('rf-pattern').value.trim();
  if(!desc||!pattern)return alert('请输入规则描述和命名模式');
  const fields=[];
  document.querySelectorAll('#rf-fields > div').forEach(row=>{
    const inputs=row.querySelectorAll('input');
    if(inputs[0].value.trim())fields.push({name:inputs[0].value.trim(),position:inputs[1].value.trim(),description:inputs[2].value.trim(),examples:[]});
  });
  const brand=getBrand(brandId);
  if(brand){brand.namingRules.push({id:Date.now().toString(),categoryId:'',pattern,description:desc,fields});saveData();renderAdmin();closeModal();}
}

function deleteRule(brandId,ruleId){
  if(!confirm('确定删除该命名规则？'))return;
  const brand=getBrand(brandId);
  if(brand){brand.namingRules=brand.namingRules.filter(r=>r.id!==ruleId);saveData();renderAdmin();}
}
